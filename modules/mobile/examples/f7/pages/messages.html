<script>
    export default (props, { $f7, $el, $on, $ }) => {
        const images = [
            "https://cdn.framework7.io/placeholder/cats-300x300-1.jpg",
            "https://cdn.framework7.io/placeholder/cats-200x300-2.jpg",
            "https://cdn.framework7.io/placeholder/cats-400x300-3.jpg",
            "https://cdn.framework7.io/placeholder/cats-300x150-4.jpg",
            "https://cdn.framework7.io/placeholder/cats-150x300-5.jpg",
            "https://cdn.framework7.io/placeholder/cats-300x300-6.jpg",
            "https://cdn.framework7.io/placeholder/cats-300x300-7.jpg",
            "https://cdn.framework7.io/placeholder/cats-200x300-8.jpg",
            "https://cdn.framework7.io/placeholder/cats-400x300-9.jpg",
            "https://cdn.framework7.io/placeholder/cats-300x150-10.jpg",
        ];
        const people = [
            {
                name: "Lorena Venegas",
                avatar: "img/onboarding/oldwoman-notebook.png",
            },
        ];
        const answers = [
            "Muy Bien, Nos vemos mañana a las 16",
            "Que rico, mañana a las 16 nos vemos entonces",
        ];

        let responseInProgress = false;
        let messagebar;
        let messages;

        const sheetToggle = () => {
            messagebar.sheetToggle();
        };
        const deleteAttachment = (e, index) => {
            var image = messagebar.attachments.splice(index, 1)[0];
            messagebar.renderAttachments();
            checkAttachments();
            // Uncheck in sheet
            var imageIndex = images.indexOf(image);
            $el.value
                .find(".messagebar-sheet .checkbox")
                .eq(imageIndex)
                .find("input")
                .prop("checked", false);
        };
        const handleAttachment = (e) => {
            var index = $(e.target).parents("label.checkbox").index();
            var image = images[index];
            if (e.target.checked) {
                // Add to attachments
                messagebar.attachments.unshift(image);
            } else {
                // Remove from attachments
                messagebar.attachments.splice(
                    messagebar.attachments.indexOf(image),
                    1,
                );
            }
            messagebar.renderAttachments();
            checkAttachments();
        };
        const checkAttachments = () => {
            if (messagebar.attachments.length > 0) {
                messagebar.attachmentsShow();
                messagebar.setPlaceholder("Comentario o Enviar");
            } else {
                messagebar.attachmentsHide();
                messagebar.setPlaceholder("Escribir mensaje...");
            }
        };
        const sendMessage = () => {
            var text = messagebar.getValue().replace(/\n/g, "<br />").trim();
            var messagesToSend = [];
            messagebar.attachments.forEach(function (attachment) {
                var size = attachment
                    .split("placeholder/cats-")[1]
                    .split("-")[0]
                    .split("x");
                messagesToSend.push({
                    image:
                        '<img src="' +
                        attachment +
                        '" style="width: ' +
                        size[0] / 2 +
                        "px; height: " +
                        size[1] / 2 +
                        'px">',
                });
            });
            if (text.trim().length) {
                messagesToSend.push({
                    text: text,
                });
            }
            // Reset attachments
            messagebar.attachments = [];
            checkAttachments();
            // Hide sheet
            messagebar.sheetHide();
            // Uncheck selected images in sheet
            messagebar.$sheetEl.find("input").prop("checked", false);
            // Clear area
            messagebar.clear();
            // Focus area
            if (text.length) messagebar.focus();
            // Exit when nothing to send
            if (!messagesToSend.length) return;
            // Send message
            messages.addMessages(messagesToSend);

            // Mock response
            if (responseInProgress) return;
            responseInProgress = true;
            setTimeout(function () {
                var answer =
                    answers[Math.floor(Math.random() * answers.length)];
                var person = people[Math.floor(Math.random() * people.length)];
                messages.showTyping({
                    header: person.name + " esta escribiendo",
                    avatar: person.avatar,
                });
                setTimeout(function () {
                    messages.addMessage({
                        text: answer,
                        type: "received",
                        name: person.name,
                        avatar: person.avatar,
                    });
                    messages.hideTyping();
                    responseInProgress = false;
                }, 4000);
            }, 1000);
        };

        $on("pageInit", () => {
            messagebar = $f7.messagebar.create({
                el: $el.value.find(".messagebar"),
                attachments: [],
            });
            messages = $f7.messages.create({
                el: $el.value.find(".messages"),
                firstMessageRule: function (
                    message,
                    previousMessage,
                    nextMessage,
                ) {
                    if (message.isTitle) return false;
                    if (
                        !previousMessage ||
                        previousMessage.type !== message.type ||
                        previousMessage.name !== message.name
                    )
                        return true;
                    return false;
                },
                lastMessageRule: function (
                    message,
                    previousMessage,
                    nextMessage,
                ) {
                    if (message.isTitle) return false;
                    if (
                        !nextMessage ||
                        nextMessage.type !== message.type ||
                        nextMessage.name !== message.name
                    )
                        return true;
                    return false;
                },
                tailMessageRule: function (
                    message,
                    previousMessage,
                    nextMessage,
                ) {
                    if (message.isTitle) return false;
                    if (
                        !nextMessage ||
                        nextMessage.type !== message.type ||
                        nextMessage.name !== message.name
                    )
                        return true;
                    return false;
                },
            });
        });
        $on("pageBeforeRemove", () => {
            messagebar.destroy();
            messages.destroy();
        });

        return $render;
    };
</script>
