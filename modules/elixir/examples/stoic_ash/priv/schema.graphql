schema {
  mutation: RootMutationType
  query: RootQueryType
}

"The result of the :destroy_quote mutation"
type DestroyQuoteResult {
  "The record that was successfully deleted"
  result: Quote

  "Any errors generated, if the mutation failed"
  errors: [MutationError!]!
}

"The result of the :update_quote mutation"
type UpdateQuoteResult {
  "The successful result of the mutation"
  result: Quote

  "Any errors generated, if the mutation failed"
  errors: [MutationError!]!
}

input UpdateQuoteInput {
  quote: String
  author: String
  source: String
}

"The result of the :create_quote mutation"
type CreateQuoteResult {
  "The successful result of the mutation"
  result: Quote

  "Any errors generated, if the mutation failed"
  errors: [MutationError!]!
}

input CreateQuoteInput {
  quote: String!
  author: String!
  source: String!
}

enum QuoteSortField {
  ID
  QUOTE
  AUTHOR
  SOURCE
}

"A keyset page of :quote"
type KeysetPageOfQuote {
  "Total count on all pages"
  count: Int

  "The records contained in the page"
  results: [Quote!]

  "The first keyset in the results"
  startKeyset: String

  "The last keyset in the results"
  endKeyset: String
}

input QuoteFilterSource {
  isNil: Boolean
  eq: String
  notEq: String
  in: [String!]
  lessThan: String
  greaterThan: String
  lessThanOrEqual: String
  greaterThanOrEqual: String
  like: String
  ilike: String
}

input QuoteFilterAuthor {
  isNil: Boolean
  eq: String
  notEq: String
  in: [String!]
  lessThan: String
  greaterThan: String
  lessThanOrEqual: String
  greaterThanOrEqual: String
  like: String
  ilike: String
}

input QuoteFilterQuote {
  isNil: Boolean
  eq: String
  notEq: String
  in: [String!]
  lessThan: String
  greaterThan: String
  lessThanOrEqual: String
  greaterThanOrEqual: String
  like: String
  ilike: String
}

input QuoteFilterId {
  isNil: Boolean
  eq: Int
  notEq: Int
  in: [Int!]
  lessThan: Int
  greaterThan: Int
  lessThanOrEqual: Int
  greaterThanOrEqual: Int
}

input QuoteFilterInput {
  and: [QuoteFilterInput!]
  or: [QuoteFilterInput!]
  not: [QuoteFilterInput!]
  id: QuoteFilterId
  quote: QuoteFilterQuote
  author: QuoteFilterAuthor
  source: QuoteFilterSource
}

input QuoteSortInput {
  order: SortOrder
  field: QuoteSortField!
}

type Quote {
  id: ID!
  quote: String!
  author: String!
  source: String!
}

enum SortOrder {
  DESC
  DESC_NULLS_FIRST
  DESC_NULLS_LAST
  ASC
  ASC_NULLS_FIRST
  ASC_NULLS_LAST
}

"An error generated by a failed mutation"
type MutationError {
  "The human readable error message"
  message: String

  "A shorter error message, with vars not replaced"
  shortMessage: String

  "Replacements for the short message"
  vars: Json

  "An error code for the given error"
  code: String

  "The field or fields that produced the error"
  fields: [String!]
}

type RootQueryType {
  """
  Hello! This is a sample query to verify that AshGraphql has been set up correctly.
  Remove me once you have a query of your own!
  """
  sayHello: String

  randomQuote(
    "How to sort the records in the response"
    sort: [QuoteSortInput]

    "A filter to limit the results"
    filter: QuoteFilterInput
  ): [Quote!]!

  listQuotes(
    "How to sort the records in the response"
    sort: [QuoteSortInput]

    "A filter to limit the results"
    filter: QuoteFilterInput

    "The number of records to return from the beginning. Maximum 250"
    first: Int

    "Show records before the specified keyset."
    before: String

    "Show records after the specified keyset."
    after: String

    "The number of records to return to the end. Maximum 250"
    last: Int
  ): KeysetPageOfQuote
}

type RootMutationType {
  createQuote(input: CreateQuoteInput!): CreateQuoteResult!
  updateQuote(id: ID!, input: UpdateQuoteInput): UpdateQuoteResult!
  destroyQuote(id: ID!): DestroyQuoteResult!
}

"""
The `Json` scalar type represents arbitrary json string data, represented as UTF-8
character sequences. The Json type is most often used to represent a free-form
human-readable json string.
"""
scalar Json
